<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Nodea — K Sauge (handoff)</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #efece6; font-family: 'Instrument Sans', system-ui, sans-serif; }
  .wrap { padding: 32px; display: flex; flex-direction: column; gap: 32px; align-items: flex-start; }
  .label { font-size: 12px; color: #88857c; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="source/dir-k.jsx"></script>
<script type="text/babel" src="source/dir-k-extras.jsx"></script>

<script type="text/babel">
  function App() {
    const screens = [
      { l: 'Login',                              C: window.DirK_Login,    p: { tone: 'sauge' } },
      { l: 'Accueil',                            C: window.DirK_Home,     p: { tone: 'sauge' } },
      { l: 'Mon compte (4 onglets)',             C: window.DirK_Account,  p: { tone: 'sauge' } },
      { l: 'État vide · premier jour',           C: window.DirK_Empty,    p: {} },
      { l: 'Composer ⌘K · nouvelle entrée',      C: window.DirK_Composer, p: {} },
      { l: 'Mood · vue détail',                  C: window.DirK_Mood,     p: {} },
      { l: 'Passages · groupés par livre',       C: window.DirK_Passages, p: {} },
      { l: 'Accueil · nuit chaude',              C: window.DirK_HomeDark, p: {} },
    ];
    return (
      <div className="wrap">
        {screens.map(({ l, C, p }) => (
          <div key={l}>
            <div className="label" style={{ marginBottom: 8 }}>{l}</div>
            <C {...p}/>
          </div>
        ))}
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
