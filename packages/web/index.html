<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="256x256" href="/favicon-256.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nodea</title>
  <meta
    name="description"
    content="Nodea — journal personnel et suivi de vie chiffré de bout en bout. Tes données ne quittent jamais ton appareil en clair, le serveur ne voit que du chiffré."
  />

  <!--
    Canonical URL (FRONT-12). Default points at the home ; `Docs.tsx`
    overrides per-tab at runtime to `/docs/<tab>` so each tier gets
    its own authoritative URL for search engines. The /flow surface
    keeps this default — privacy invariant, no per-module canonical.
  -->
  <link rel="canonical" href="https://nodea.app/" />

  <!--
    Open Graph + Twitter card meta. Static values — Nodea is a CSR
    SPA, so all routes serve the same index.html and the same
    preview card. The image is a 1200×630 PNG hosted alongside the
    favicon assets ; if it ever moves, update the og:image / og:url
    paths below in lockstep.

    The og:url uses a relative-canonical pattern ("/" + JS sets the
    runtime URL) ; previews of deep links still pick up the description
    + image, only the URL field stays generic — fine for an E2EE app
    where the privacy invariant says module-visited URLs must not
    leak anyway (see Frontend rules in CLAUDE.md).
  -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Nodea — journaling chiffré bout-à-bout" />
  <meta
    property="og:description"
    content="Journal personnel et suivi de vie où tes données ne quittent jamais ton appareil en clair. Le serveur ne voit que du chiffré."
  />
  <meta property="og:image" content="/og-card.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://nodea.app/" />
  <meta property="og:locale" content="fr_FR" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nodea — journaling chiffré bout-à-bout" />
  <meta
    name="twitter:description"
    content="Journal personnel et suivi de vie où tes données ne quittent jamais ton appareil en clair."
  />
  <meta name="twitter:image" content="/og-card.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
