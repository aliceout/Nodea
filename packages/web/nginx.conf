server {
    # OPS-03 — listen on an unprivileged port (8080) so nginx can
    # run entirely as the `nginx` user without needing
    # CAP_NET_BIND_SERVICE. The compose host mapping (port 80
    # external → 8080 internal) lets users reach the SPA at the
    # usual port from the outside.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy every API namespace under a single /api/ prefix so the
    # web and the API share a single origin in production. The trailing slash
    # on `proxy_pass` strips the `/api/` prefix before forwarding — the API
    # routes know themselves as `/auth/login`, `/modules-config`, etc.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # SEC-03 — forward X-Forwarded-For as-is from the upstream
        # nginx (which is responsible for writing the real client
        # IP via REC-S2 : `proxy_set_header X-Forwarded-For
        # $remote_addr;`). Using `$proxy_add_x_forwarded_for` here
        # would APPEND this container's `$remote_addr` (= the
        # upstream nginx's IP) at the end of the chain, defeating
        # the api's "read last hop" rate-limit logic — every
        # request would land in the same bucket keyed on the
        # upstream nginx's IP.
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # SPA fallback — any path that's not a static asset hits index.html so
    # React Router can resolve it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted assets produced by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
