server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy every API namespace under a single /api/ prefix so the
    # web and the API share a single origin in production. The trailing slash
    # on `proxy_pass` strips the `/api/` prefix before forwarding — the API
    # routes know themselves as `/auth/login`, `/modules-config`, etc.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }

    # SPA fallback — any path that's not a static asset hits index.html so
    # React Router can resolve it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted assets produced by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
