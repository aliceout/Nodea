# docker-compose for Nodea — full stack.
#
# Three services:
#   - postgres : data store
#   - api      : Hono backend (auto-migrates on start)
#   - web      : static SPA behind nginx, reverse-proxies /api/* to `api`
#
# Images: api + web each carry both an `image:` (GHCR) and a `build:` section.
# `docker compose pull` resolves from GHCR; `docker compose build` / `up --build`
# rebuilds locally and overwrites the same tag. Overridable via NODEA_IMAGE_TAG
# (defaults to `main`).
#
# Quick start (local dev):
#   cp .env.example .env
#   # edit COOKIE_SECRET (≥ 32 chars) + set COOKIE_SECURE=true behind TLS
#   docker compose up -d --build
#
# Prod deploy (VPS, images already pushed by the Docker build workflow):
#   docker compose pull && docker compose up -d
#
# One-time admin seed (both flows):
#   docker compose exec api pnpm --filter @nodea/api seed:admin
#
# Postgres persistence: the data lives under `$DATA_DIR/postgres/` as a
# bind mount (default in dev: `./data/postgres/`, gitignored ; in prod:
# `$HOME/data/nodea/postgres/`, set by `scripts/deploy.sh`). NOT a
# named Docker volume — those are wipeable by `docker compose down -v`
# or `docker volume prune` and have killed prod data before. Drizzle
# migrations run on api boot ; user data survives every deploy.

services:
  postgres:
    image: postgres:16-alpine
    container_name: nodea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nodea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nodea_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nodea}
    # SEC-05 : bind on 127.0.0.1 only — never on 0.0.0.0. The api
    # container reaches Postgres via the docker-compose internal
    # network (`postgres:5432`), so an external port is needed only
    # for local dev tools (psql, DBeaver, `pnpm --filter @nodea/api
    # dev` running on the host). Without the explicit `127.0.0.1:`
    # prefix, Docker's default exposes the port on every host
    # interface — a misconfigured firewall on a VPS would put
    # Postgres on the public internet behind only its password.
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5433}:5432'
    volumes:
      # Bind mount under `$HOME/data/nodea/postgres/` (see
      # `scripts/deploy.sh`, which exports `DATA_DIR`
      # before invoking docker compose). Bind mount, not a
      # named Docker volume — the latter lives under
      # `/var/lib/docker/volumes/` and is wipeable by
      # `docker compose down -v` or `docker volume prune`.
      # Both have killed prod data more than once. Bind mounts
      # under the user's home are also picked up by the host's
      # standard backup tooling (which usually targets
      # `/home/$USER/...`). Local dev with no `DATA_DIR` set
      # falls back to `./data/postgres` at the repo root,
      # gitignored.
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nodea} -d ${POSTGRES_DB:-nodea}']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: ghcr.io/aliceout/nodea-api:${NODEA_IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: nodea-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: postgres://${POSTGRES_USER:-nodea}:${POSTGRES_PASSWORD:-nodea_dev}@postgres:5432/${POSTGRES_DB:-nodea}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required (≥ 32 chars)}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-2592000}
      WEB_BASE_URL: ${WEB_BASE_URL:-}
      # SMTP — leave empty to log mails to stderr. For dev, run the
      # optional `mailpit` service (`docker compose --profile dev up`)
      # and set SMTP_HOST=mailpit SMTP_PORT=1025 in the root .env.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-nodea@localhost.invalid}
      # Seed admin — only consumed by `pnpm --filter @nodea/api seed:admin`
      # invoked post-deploy. The service itself ignores them at runtime.
      # Present here so `docker compose exec api seed:admin` sees them
      # in `process.env` — docker-compose does NOT forward values from
      # the root `.env` into containers unless they're listed on the
      # service (that file is only read for `${VAR}` substitutions).
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      # Optional webhook URL pinged on every 5xx (Discord / Slack /
      # custom relay). Leave empty to disable. The middleware sends
      # method + path + status + duration only — no body, headers,
      # or query string. See packages/api/src/middleware/error-webhook.ts
      ERROR_WEBHOOK_URL: ${ERROR_WEBHOOK_URL:-}
      # Optional Sentry DSN for the api process. Leave empty to keep
      # Sentry uninitialised (no events leave the process). When set,
      # `beforeSend` strips bodies, cookies, query strings, and the
      # X-Sid / X-Guard headers — see packages/api/src/sentry.ts.
      SENTRY_DSN: ${SENTRY_DSN_API:-}
    expose:
      - '3000'
    # Honest healthcheck — hits /healthz which itself probes Postgres
    # (see packages/api/src/app.ts). A 503 body still produces a
    # non-zero wget exit so the container goes `unhealthy` whenever
    # the api can't reach the DB. start_period gives Drizzle's
    # auto-migrate room to run before the first probe lands.
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000/healthz || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    image: ghcr.io/aliceout/nodea-web:${NODEA_IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: nodea-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # OPS-03 : the container's nginx now runs as the unprivileged
    # `nginx` user and listens on 8080 internally (binding port
    # 80 would require root or CAP_NET_BIND_SERVICE). The host
    # mapping translates the external `WEB_PORT` (default 8080)
    # to the container's 8080, so the SPA is reachable at the
    # usual external port.
    ports:
      - '${WEB_PORT:-8080}:8080'
    # nginx healthcheck — confirms the static SPA is being served. The
    # /api proxy depends on the api container which has its own
    # healthcheck, so we don't double-proxy here. Probes the
    # internal port (8080), not the external mapping.
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8080/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  # Dev-only SMTP sink. Captures every email sent by the API (password
  # reset, …) and exposes them in a web UI at http://localhost:8025 —
  # nothing ever leaves the machine. Not started by default; bring it
  # up explicitly with `docker compose --profile dev up -d mailpit`,
  # or `docker compose --profile dev up` to launch the whole dev stack
  # including the sink.
  mailpit:
    image: axllent/mailpit:latest
    container_name: nodea-mailpit
    restart: unless-stopped
    profiles: ['dev']
    ports:
      # 1025 — SMTP, exposed for local dev so `pnpm --filter @nodea/api
      # dev` running outside Docker can use SMTP_HOST=127.0.0.1.
      # Containers on the same compose network reach it as `mailpit:1025`.
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
      # 8025 — web UI.
      - '${MAILPIT_UI_PORT:-8025}:8025'
