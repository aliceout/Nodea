name: Docker build

# Fires after CI succeeds on `main` — so we only ever push an image
# whose typecheck + tests are green. A successful run of this
# workflow is what the VPS listens to (via its own `workflow_run`
# webhook filter) to trigger the production deploy.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build + push ${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only build when the upstream CI run was a success (or when the
    # job is triggered manually via workflow_dispatch).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nodea-api
            dockerfile: packages/api/Dockerfile
          - image: nodea-web
            dockerfile: packages/web/Dockerfile

    steps:
      - name: Checkout (sha that passed CI)
        uses: actions/checkout@v4
        with:
          # For workflow_run, GITHUB_SHA is the sha of the triggering
          # event — check out exactly that commit so the image we push
          # matches the one CI validated.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=main,enable=${{ (github.event.workflow_run.head_branch || github.ref_name) == 'main' }}
            type=raw,value=latest,enable=${{ (github.event.workflow_run.head_branch || github.ref_name) == 'main' }}
            type=sha,format=short,prefix=sha-

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
